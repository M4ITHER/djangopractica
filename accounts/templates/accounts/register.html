<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register | CyberLab</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f1a;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #1e1e2e;
            padding: 30px;
            border-radius: 10px;
            width: 450px;
        }

        h1 {
            color: #89b4fa;
            text-align: center;
            margin-bottom: 25px;
        }

        form p {
            margin-bottom: 15px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background: #11111b;
            border: 1px solid #45475a;
            color: #cdd6f4;
            border-radius: 5px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #89b4fa;
            color: #11111b;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        p {
            text-align: center;
            margin-top: 20px;
        }

        a {
            color: #89b4fa;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a href="{% url 'accounts:login' %}">
                Login
            </a>
        </p>

    </div>

</body>

</html>
